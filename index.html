<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fishing's Home</title>

  <!-- Google Fonts & Material Symbols -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&family=Roboto:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

  <style>
    /* ============ MD3 亮色变量 ============ */
    :root {
      --md-sys-color-primary: #6750A4;
      --md-sys-color-on-primary: #FFFFFF;
      --md-sys-color-primary-container: #EADDFF;
      --md-sys-color-on-primary-container: #21005D;
      --md-sys-color-secondary: #625B71;
      --md-sys-color-on-secondary: #FFFFFF;
      --md-sys-color-secondary-container: #E8DEF8;
      --md-sys-color-on-secondary-container: #1D192B;
      --md-sys-color-tertiary: #7D5260;
      --md-sys-color-on-tertiary: #FFFFFF;
      --md-sys-color-tertiary-container: #FFD8E4;
      --md-sys-color-on-tertiary-container: #31111D;
      --md-sys-color-surface: #FEF7FF;
      --md-sys-color-on-surface: #1D1B20;
      --md-sys-color-surface-variant: #E7E0EC;
      --md-sys-color-on-surface-variant: #49454F;
      --md-sys-color-outline: #79747E;
      --md-sys-color-outline-variant: #CAC4D0;
      --md-sys-color-shadow: #000000;
      --md-sys-color-scrim: #000000;
      --md-sys-color-surface-container-lowest: #FFFFFF;
      --md-sys-color-surface-container-low: #F7F2FA;
      --md-sys-color-surface-container: #F3EDF7;
      --md-sys-color-surface-container-high: #ECE6F0;
      --md-sys-color-surface-container-highest: #E6E0E9;
      --md-elevation-level1: 0px 1px 2px 0px rgba(0, 0, 0, 0.08), 0px 1px 3px 1px rgba(0, 0, 0, 0.06);
      --md-elevation-level2: 0px 1px 2px 0px rgba(0, 0, 0, 0.08), 0px 2px 6px 2px rgba(0, 0, 0, 0.06);
      --md-elevation-level3: 0px 4px 8px 3px rgba(0, 0, 0, 0.08), 0px 1px 3px 0px rgba(0, 0, 0, 0.08);
      --md-elevation-level4: 0px 6px 10px 4px rgba(0, 0, 0, 0.08), 0px 2px 3px 0px rgba(0, 0, 0, 0.08);
      --md-shape-corner-extra-small: 4px;
      --md-shape-corner-small: 8px;
      --md-shape-corner-medium: 12px;
      --md-shape-corner-large: 16px;
      --md-shape-corner-extra-large: 28px;
      --md-shape-corner-full: 999px;
      --md-transition-standard: 0.25s cubic-bezier(0.2, 0, 0, 1);

      /* 卡片比例控制变量 */
      --card-min-height: auto;
      --card-icon-size: 44px;
      --card-icon-font: 22px;
      --card-padding-v: 16px;
      --card-padding-h: 18px;
      --card-name-font: 0.95rem;
      --card-desc-lines: 1;
      --card-gap: 14px;
    }

    /* 大卡片样式 (拉伸比例) */
    .card-style-large {
      --card-min-height: 110px;
      --card-icon-size: 56px;
      --card-icon-font: 28px;
      --card-padding-v: 22px;
      --card-padding-h: 24px;
      --card-name-font: 1.05rem;
      --card-desc-lines: 3;
      --card-gap: 18px;
    }

    /* ============ 暗色变量 ============ */
    [data-theme="dark"] {
      --md-sys-color-primary: #D0BCFF;
      --md-sys-color-on-primary: #381E72;
      --md-sys-color-primary-container: #4F378B;
      --md-sys-color-on-primary-container: #EADDFF;
      --md-sys-color-secondary: #CCC2DC;
      --md-sys-color-on-secondary: #332D41;
      --md-sys-color-secondary-container: #4A4458;
      --md-sys-color-on-secondary-container: #E8DEF8;
      --md-sys-color-tertiary: #EFB8C8;
      --md-sys-color-on-tertiary: #492532;
      --md-sys-color-tertiary-container: #633B48;
      --md-sys-color-on-tertiary-container: #FFD8E4;
      --md-sys-color-surface: #1D1B20;
      --md-sys-color-on-surface: #E6E1E5;
      --md-sys-color-surface-variant: #49454F;
      --md-sys-color-on-surface-variant: #CAC4D0;
      --md-sys-color-outline: #938F99;
      --md-sys-color-outline-variant: #49454F;
      --md-sys-color-shadow: #000000;
      --md-sys-color-scrim: #000000;
      --md-sys-color-surface-container-lowest: #0F0D13;
      --md-sys-color-surface-container-low: #1D1B20;
      --md-sys-color-surface-container: #211F26;
      --md-sys-color-surface-container-high: #2B2930;
      --md-sys-color-surface-container-highest: #36343B;
      --md-elevation-level1: 0px 1px 3px 1px rgba(0, 0, 0, 0.3), 0px 1px 2px 0px rgba(0, 0, 0, 0.4);
      --md-elevation-level2: 0px 2px 6px 2px rgba(0, 0, 0, 0.35), 0px 1px 2px 0px rgba(0, 0, 0, 0.4);
      --md-elevation-level3: 0px 4px 8px 3px rgba(0, 0, 0, 0.4), 0px 1px 3px 0px rgba(0, 0, 0, 0.35);
      --md-elevation-level4: 0px 6px 10px 4px rgba(0, 0, 0, 0.45), 0px 2px 3px 0px rgba(0, 0, 0, 0.4);
    }

    /* ============ 基础重置 ============ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: 'Roboto', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      background-color: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
      line-height: 1.6;
      min-height: 100vh;
      transition: background-color var(--md-transition-standard), color var(--md-transition-standard);
      position: relative;
      overflow-x: hidden;
    }

    /* ============ 背景图层 ============ */
    .bg-layer-system {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-image-layer {
      position: absolute;
      inset: -30px;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: opacity 0.5s ease, filter 0.5s ease;
      will-change: filter, opacity;
    }

    .bg-overlay-layer {
      position: absolute;
      inset: 0;
      background: var(--md-sys-color-surface);
      opacity: 0.85;
      transition: opacity var(--md-transition-standard), background var(--md-transition-standard);
    }

    [data-theme="dark"] .bg-overlay-layer {
      opacity: 0.8;
    }

    .bg-layer-system[data-bg-active="true"] .bg-overlay-layer {
      opacity: 0.55;
    }

    [data-theme="dark"] .bg-layer-system[data-bg-active="true"] .bg-overlay-layer {
      opacity: 0.5;
    }

    /* ============ 顶部栏 ============ */
    .top-bar {
      position: relative;
      z-index: 20;
      background: var(--md-sys-color-surface-container-low);
      border-bottom: 1px solid var(--md-sys-color-outline-variant);
      box-shadow: var(--md-elevation-level1);
      transition: all var(--md-transition-standard);
    }

    .top-bar-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
    }

    .top-bar-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--md-sys-color-on-surface);
      letter-spacing: -0.01em;
      user-select: none;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .top-bar-title .material-symbols-outlined {
      font-size: 22px;
      color: var(--md-sys-color-primary);
    }

    .menu-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--md-sys-color-on-surface-variant);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--md-transition-standard);
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }

    .menu-btn:hover {
      background: var(--md-sys-color-surface-container-high);
      color: var(--md-sys-color-on-surface);
    }

    .menu-btn .material-symbols-outlined {
      font-size: 24px;
      transition: transform 0.3s ease;
    }

    .menu-btn.active .material-symbols-outlined {
      transform: rotate(90deg);
    }

    /* ============ 下拉设置面板 ============ */
    .settings-panel {
      position: absolute;
      top: 100%;
      right: 20px;
      width: 300px;
      max-width: calc(100vw - 40px);
      background: var(--md-sys-color-surface-container-high);
      border-radius: var(--md-shape-corner-large);
      box-shadow: var(--md-elevation-level3);
      border: 1px solid var(--md-sys-color-outline-variant);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transform-origin: top right;
      transform: scale(0.9);
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
      z-index: 25;
    }

    .settings-panel.open {
      transform: scale(1);
      opacity: 1;
      pointer-events: auto;
    }

    /* 面板内部控件 */
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .setting-label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--md-sys-color-on-surface-variant);
      user-select: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .setting-label .material-symbols-outlined {
      font-size: 18px;
    }

    /* 开关 */
    .toggle-switch {
      position: relative;
      width: 48px;
      height: 28px;
      flex-shrink: 0;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: var(--md-sys-color-surface-variant);
      border-radius: 14px;
      transition: all var(--md-transition-standard);
      border: 2px solid var(--md-sys-color-outline);
    }

    .toggle-slider::before {
      content: "";
      position: absolute;
      height: 20px;
      width: 20px;
      left: 2px;
      bottom: 2px;
      background: var(--md-sys-color-on-primary);
      border-radius: 50%;
      transition: all var(--md-transition-standard);
      box-shadow: var(--md-elevation-level1);
    }

    input:checked+.toggle-slider {
      background: var(--md-sys-color-primary);
      border-color: var(--md-sys-color-primary);
    }

    input:checked+.toggle-slider::before {
      transform: translateX(20px);
    }

    /* 滑块组 */
    .slider-group {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
    }

    .slider-group label {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--md-sys-color-on-surface-variant);
      min-width: 36px;
    }

    .slider-group input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: var(--md-sys-color-surface-variant);
      outline: none;
      cursor: pointer;
    }

    .slider-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--md-sys-color-primary);
      border: 2px solid var(--md-sys-color-on-primary);
      cursor: pointer;
      box-shadow: var(--md-elevation-level1);
    }

    .slider-value {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--md-sys-color-primary);
      min-width: 32px;
      text-align: right;
    }

    /* 卡片大小切换按钮 */
    .card-size-toggle {
      display: flex;
      background: var(--md-sys-color-surface-container-low);
      border-radius: var(--md-shape-corner-full);
      padding: 3px;
      gap: 2px;
      border: 1px solid var(--md-sys-color-outline-variant);
    }

    .card-size-btn {
      padding: 6px 14px;
      border: none;
      border-radius: var(--md-shape-corner-full);
      background: transparent;
      color: var(--md-sys-color-on-surface-variant);
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all var(--md-transition-standard);
    }

    .card-size-btn.active {
      background: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
      box-shadow: var(--md-elevation-level1);
    }

    /* 重置按钮 */
    .reset-btn {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--md-sys-color-outline-variant);
      border-radius: var(--md-shape-corner-full);
      background: transparent;
      color: var(--md-sys-color-on-surface-variant);
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all var(--md-transition-standard);
    }

    .reset-btn:hover {
      background: var(--md-sys-color-surface-variant);
      color: var(--md-sys-color-on-surface);
    }

    /* 分隔线 */
    .settings-divider {
      height: 1px;
      background: var(--md-sys-color-outline-variant);
      margin: 4px 0;
    }

    /* 隐藏的条件控件 */
    .bg-conditional {
      display: none;
    }

    .bg-active .bg-conditional {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ============ 主容器 ============ */
    .main-container {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 24px 100px;
    }

    /* 头部 */
    .header {
      text-align: center;
      padding: 28px 20px 8px;
      animation: fadeInUp 0.6s ease both;
    }

    .avatar-wrapper {
      display: inline-block;
      position: relative;
      margin-bottom: 12px;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--md-sys-color-primary-container), var(--md-sys-color-tertiary-container));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: var(--md-sys-color-on-primary-container);
      box-shadow: var(--md-elevation-level2);
      border: 3px solid var(--md-sys-color-surface-container-lowest);
      transition: all var(--md-transition-standard);
    }

    .avatar-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px dashed var(--md-sys-color-outline-variant);
      animation: spin 30s linear infinite;
      opacity: 0.4;
      pointer-events: none;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .header-title {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .header-subtitle {
      font-size: 0.9rem;
      color: var(--md-sys-color-on-surface-variant);
      max-width: 450px;
      margin: 0 auto;
    }

    /* 搜索 */
    .search-section {
      max-width: 560px;
      margin: 18px auto 28px;
      animation: fadeInUp 0.6s ease 0.1s both;
    }

    .search-field-wrapper {
      display: flex;
      align-items: center;
      background: var(--md-sys-color-surface-container-high);
      border-radius: var(--md-shape-corner-full);
      border: 2px solid var(--md-sys-color-outline-variant);
      transition: all var(--md-transition-standard);
      overflow: hidden;
    }

    .search-field-wrapper:focus-within {
      border-color: var(--md-sys-color-primary);
      box-shadow: 0 0 0 4px rgba(103, 80, 164, 0.12);
    }

    .search-icon {
      margin-left: 16px;
      color: var(--md-sys-color-on-surface-variant);
    }

    .search-input {
      width: 100%;
      padding: 14px 16px;
      font-size: 0.95rem;
      border: none;
      outline: none;
      background: transparent;
      color: var(--md-sys-color-on-surface);
    }

    .search-clear-btn {
      margin-right: 8px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--md-sys-color-on-surface-variant);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: all var(--md-transition-standard);
    }

    .search-clear-btn.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .search-hint {
      text-align: center;
      font-size: 0.75rem;
      color: var(--md-sys-color-on-surface-variant);
      margin-top: 6px;
      opacity: 0.6;
    }

    /* 分类与卡片 */
    .categories-wrapper {
      display: flex;
      flex-direction: column;
      gap: 26px;
    }

    .category-section {
      animation: fadeInUp 0.55s ease both;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .category-icon {
      font-size: 24px;
      color: var(--md-sys-color-primary);
    }

    .category-title {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .category-count {
      font-size: 0.75rem;
      background: var(--md-sys-color-surface-container-high);
      padding: 2px 10px;
      border-radius: var(--md-shape-corner-full);
      color: var(--md-sys-color-on-surface-variant);
    }

    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: var(--card-gap);
    }

    /* 卡片样式 */
    .link-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: var(--card-padding-v) var(--card-padding-h);
      border-radius: var(--md-shape-corner-large);
      background: var(--md-sys-color-surface-container-low);
      text-decoration: none;
      color: var(--md-sys-color-on-surface);
      box-shadow: var(--md-elevation-level1);
      border: 1px solid transparent;
      transition: all var(--md-transition-standard);
      position: relative;
      overflow: hidden;
      min-height: var(--card-min-height);
    }

    .link-card:hover {
      box-shadow: var(--md-elevation-level3);
      transform: translateY(-2px);
      background: var(--md-sys-color-surface-container-high);
      border-color: var(--md-sys-color-outline-variant);
    }

    .link-card-icon-wrapper {
      flex-shrink: 0;
      width: var(--card-icon-size);
      height: var(--card-icon-size);
      border-radius: var(--md-shape-corner-medium);
      background: var(--md-sys-color-primary-container);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--md-sys-color-on-primary-container);
      font-size: var(--card-icon-font);
      transition: all var(--md-transition-standard);
    }

    .link-card:hover .link-card-icon-wrapper {
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
    }

    .link-card-info {
      flex: 1;
      min-width: 0;
    }

    .link-card-name {
      font-size: var(--card-name-font);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .link-card-desc {
      font-size: 0.75rem;
      color: var(--md-sys-color-on-surface-variant);
      display: -webkit-box;
      -webkit-line-clamp: var(--card-desc-lines);
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-top: 2px;
    }

    .external-badge {
      font-size: 14px;
      opacity: 0.6;
    }

    /* 无结果 */
    .no-results {
      text-align: center;
      padding: 40px;
      color: var(--md-sys-color-on-surface-variant);
      display: none;
    }

    .no-results.visible {
      display: block;
    }

    /* FAB 主题按钮 */
    .fab-theme-toggle {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 52px;
      height: 52px;
      border-radius: var(--md-shape-corner-large);
      border: none;
      background: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
      font-size: 24px;
      cursor: pointer;
      box-shadow: var(--md-elevation-level3);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--md-transition-standard);
    }

    .fab-theme-toggle:hover {
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
    }

    /* 页脚 */
    .footer {
      text-align: center;
      padding: 30px 20px;
      color: var(--md-sys-color-on-surface-variant);
      font-size: 0.8rem;
      opacity: 0.7;
    }

    /* 动画 */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .top-bar-inner {
        padding: 0 14px;
      }
      .settings-panel {
        right: 10px;
        width: 280px;
      }
      .main-container {
        padding: 16px 14px 90px;
      }
      .fab-theme-toggle {
        bottom: 20px;
        right: 16px;
        width: 46px;
        height: 46px;
      }
    }
  </style>
</head>
<body>

  <!-- 背景图层 -->
  <div class="bg-layer-system" id="bgLayerSystem" data-bg-active="false">
    <div class="bg-image-layer" id="bgImageLayer"></div>
    <div class="bg-overlay-layer"></div>
  </div>

  <!-- 顶部栏 -->
  <header class="top-bar" id="topBar">
    <div class="top-bar-inner">
      <div class="top-bar-title" id="topBarTitle">
        <span class="material-symbols-outlined">near_me</span>
        <span>导航中心</span>
      </div>
      <button class="menu-btn" id="menuBtn" aria-label="设置菜单">
        <span class="material-symbols-outlined">menu</span>
      </button>
    </div>
    <!-- 下拉设置面板 -->
    <div class="settings-panel" id="settingsPanel">
      <!-- 背景开关 -->
      <div class="setting-row">
        <span class="setting-label">
          <span class="material-symbols-outlined">wallpaper</span> 背景图片
        </span>
        <label class="toggle-switch">
          <input type="checkbox" id="bgToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <!-- 条件调节区域 -->
      <div id="bgConditional" class="bg-conditional">
        <div class="slider-group">
          <label>模糊</label>
          <input type="range" id="bgBlurSlider" min="0" max="30" value="0" step="1">
          <span class="slider-value" id="bgBlurValue">0px</span>
        </div>
        <div class="slider-group">
          <label>透明</label>
          <input type="range" id="bgOpacitySlider" min="0" max="100" value="40" step="5">
          <span class="slider-value" id="bgOpacityValue">0.4</span>
        </div>
      </div>

      <div class="settings-divider"></div>

      <!-- 卡片大小切换 -->
      <div class="setting-row">
        <span class="setting-label">
          <span class="material-symbols-outlined">dashboard</span> 卡片比例
        </span>
        <div class="card-size-toggle" id="cardSizeToggle">
          <button class="card-size-btn active" data-size="small">小</button>
          <button class="card-size-btn" data-size="large">大</button>
        </div>
      </div>

      <!-- 重置按钮 -->
      <button class="reset-btn" id="resetSettingsBtn">
        <span class="material-symbols-outlined">restart_alt</span> 重置所有设置
      </button>
    </div>
  </header>

  <!-- 主内容 -->
  <main class="main-container">
    <div class="header">
      <div class="avatar-wrapper">
        <div class="avatar-ring"></div>
        <div class="avatar" id="avatarEl">👋</div>
      </div>
      <h1 class="header-title" id="headerTitle">我的导航中心</h1>
      <p class="header-subtitle" id="headerSubtitle">快速访问我的所有网站与项目</p>
    </div>

    <div class="search-section">
      <div class="search-field-wrapper">
        <span class="search-icon material-symbols-outlined">search</span>
        <input type="text" class="search-input" id="searchInput" placeholder="搜索链接..." autocomplete="off">
        <button class="search-clear-btn material-symbols-outlined" id="searchClearBtn">close</button>
      </div>
      <p class="search-hint">按 <kbd>Ctrl+K</kbd> 或 <kbd>/</kbd> 快速搜索</p>
    </div>

    <div class="no-results" id="noResults">
      <span class="material-symbols-outlined" style="font-size:48px;opacity:0.5;">search_off</span>
      <p>没有找到匹配的链接</p>
    </div>

    <div class="categories-wrapper" id="categoriesWrapper"></div>

    <footer class="footer">
      <p>© 2026 导航页 · 托管于 <a href="https://pages.github.com">GitHub Pages</a></p>
    </footer>
  </main>

  <!-- 主题切换 FAB -->
  <button class="fab-theme-toggle" id="themeToggle" aria-label="切换主题">
    <span class="material-symbols-outlined icon-moon">dark_mode</span>
    <span class="material-symbols-outlined icon-sun" style="display:none;">light_mode</span>
  </button>

  <script>
    (function() {
      // ==================== 用户配置 ====================
      const config = {
        topBarTitle: '导航中心',            // 顶部栏文字
        user: {
          name: '鱼の导航中心',
          avatar: '🐟',
          bio: '快速访问我的所有网站与项目',
        },
        // 背景图片路径 (相对于仓库根目录，例如 './img/bg.jpg')
        backgroundImage: './img/bg.jpg',
        categories: [
          {
            name: '常用工具',
            icon: 'tools_power_drill',
            links: [
              { name: 'GitHub', url: 'https://github.com', icon: 'code', description: '代码托管平台', external: true },
              { name: 'Gmail', url: 'https://mail.google.com', icon: 'mail', description: '电子邮件', external: true },
              { name: 'Google Drive', url: 'https://drive.google.com', icon: 'cloud', description: '云存储', external: true },
              { name: 'Notion', url: 'https://www.notion.so', icon: 'description', description: '笔记与协作', external: true },
            ]
          },
          {
            name: '我的项目',
            icon: 'folder_special',
            links: [
              { name: '项目展示', url: './projects.html', icon: 'dashboard', description: '个人项目合集', external: false },
              { name: '关于我', url: './about.html', icon: 'person', description: '个人介绍', external: false },
              { name: '博客', url: './blog.html', icon: 'article', description: '技术文章', external: false },
              { name: '工具箱', url: './tools.html', icon: 'build', description: '实用小工具', external: false },
            ]
          },
          {
            name: '社交媒体',
            icon: 'share',
            links: [
              { name: 'Twitter', url: 'https://twitter.com', icon: 'thumb_up', description: '社交动态', external: true },
              { name: 'LinkedIn', url: 'https://linkedin.com', icon: 'work', description: '职业档案', external: true },
            ]
          }
        ]
      };

      // ==================== 元素引用 ====================
      const bgLayerSystem = document.getElementById('bgLayerSystem');
      const bgImageLayer = document.getElementById('bgImageLayer');
      const menuBtn = document.getElementById('menuBtn');
      const settingsPanel = document.getElementById('settingsPanel');
      const bgToggle = document.getElementById('bgToggle');
      const bgConditional = document.getElementById('bgConditional');
      const bgBlurSlider = document.getElementById('bgBlurSlider');
      const bgBlurValue = document.getElementById('bgBlurValue');
      const bgOpacitySlider = document.getElementById('bgOpacitySlider');
      const bgOpacityValue = document.getElementById('bgOpacityValue');
      const cardSizeToggle = document.getElementById('cardSizeToggle');
      const resetSettingsBtn = document.getElementById('resetSettingsBtn');
      const searchInput = document.getElementById('searchInput');
      const searchClearBtn = document.getElementById('searchClearBtn');
      const noResultsEl = document.getElementById('noResults');
      const themeToggle = document.getElementById('themeToggle');
      const categoriesWrapper = document.getElementById('categoriesWrapper');

      // ==================== 设置状态管理 ====================
      const DEFAULT_SETTINGS = {
        bgEnabled: true,
        bgBlur: 8,
        bgOpacity: 0.4,
        cardSize: 'small', // 'small' | 'large'
      };
      let currentSettings = { ...DEFAULT_SETTINGS };

      function loadSettings() {
        try {
          const saved = localStorage.getItem('md3-nav-settings');
          if (saved) {
            const parsed = JSON.parse(saved);
            currentSettings = { ...DEFAULT_SETTINGS, ...parsed };
          }
        } catch (e) {}
        // 数值校正
        currentSettings.bgBlur = Math.min(30, Math.max(0, Number(currentSettings.bgBlur) || 0));
        currentSettings.bgOpacity = Math.min(1, Math.max(0, Number(currentSettings.bgOpacity) || 0.4));
        currentSettings.cardSize = currentSettings.cardSize === 'large' ? 'large' : 'small';
        currentSettings.bgEnabled = !!currentSettings.bgEnabled;
      }

      function saveSettings() {
        localStorage.setItem('md3-nav-settings', JSON.stringify(currentSettings));
      }

      function applyAllSettings() {
        // 背景开关
        const bgActive = currentSettings.bgEnabled && config.backgroundImage;
        bgLayerSystem.setAttribute('data-bg-active', bgActive ? 'true' : 'false');
        if (bgActive) {
          bgImageLayer.style.backgroundImage = `url(${config.backgroundImage})`;
          bgImageLayer.style.display = '';
        } else {
          bgImageLayer.style.backgroundImage = 'none';
          bgImageLayer.style.display = 'none';
        }
        bgImageLayer.style.filter = `blur(${currentSettings.bgBlur}px)`;
        bgImageLayer.style.opacity = currentSettings.bgOpacity;

        // UI 控件同步
        bgToggle.checked = currentSettings.bgEnabled && !!config.backgroundImage;
        if (bgToggle.checked) {
          bgConditional.classList.add('bg-conditional');
        } else {
          bgConditional.classList.remove('bg-conditional');
        }
        bgBlurSlider.value = currentSettings.bgBlur;
        bgBlurValue.textContent = currentSettings.bgBlur + 'px';
        bgOpacitySlider.value = Math.round(currentSettings.bgOpacity * 100);
        bgOpacityValue.textContent = currentSettings.bgOpacity.toFixed(2);

        // 卡片大小
        if (currentSettings.cardSize === 'large') {
          document.body.classList.add('card-style-large');
        } else {
          document.body.classList.remove('card-style-large');
        }
        const sizeBtns = cardSizeToggle.querySelectorAll('.card-size-btn');
        sizeBtns.forEach(btn => {
          btn.classList.toggle('active', btn.dataset.size === currentSettings.cardSize);
        });

        saveSettings();
      }

      function resetSettings() {
        currentSettings = { ...DEFAULT_SETTINGS };
        applyAllSettings();
        // 如果背景图片路径不存在，强制关闭开关
        if (!config.backgroundImage) {
          currentSettings.bgEnabled = false;
          bgToggle.checked = false;
          bgConditional.classList.remove('bg-conditional');
          saveSettings();
        }
      }

      // ==================== 事件绑定 ====================
      // 菜单开关
      menuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const isOpen = settingsPanel.classList.toggle('open');
        menuBtn.classList.toggle('active', isOpen);
      });

      // 点击外部关闭菜单
      document.addEventListener('click', (e) => {
        if (!settingsPanel.contains(e.target) && e.target !== menuBtn && !menuBtn.contains(e.target)) {
          settingsPanel.classList.remove('open');
          menuBtn.classList.remove('active');
        }
      });

      // 背景开关
      bgToggle.addEventListener('change', () => {
        if (!config.backgroundImage) {
          alert('请先在 config.backgroundImage 中设置背景图片路径 (例如 ./img/bg.jpg)');
          bgToggle.checked = false;
          return;
        }
        currentSettings.bgEnabled = bgToggle.checked;
        if (bgToggle.checked) {
          bgConditional.classList.add('bg-conditional');
        } else {
          bgConditional.classList.remove('bg-conditional');
        }
        applyAllSettings();
      });

      // 模糊滑块
      bgBlurSlider.addEventListener('input', () => {
        currentSettings.bgBlur = parseInt(bgBlurSlider.value);
        bgBlurValue.textContent = currentSettings.bgBlur + 'px';
        bgImageLayer.style.filter = `blur(${currentSettings.bgBlur}px)`;
        saveSettings();
      });

      // 透明度滑块
      bgOpacitySlider.addEventListener('input', () => {
        currentSettings.bgOpacity = parseInt(bgOpacitySlider.value) / 100;
        bgOpacityValue.textContent = currentSettings.bgOpacity.toFixed(2);
        bgImageLayer.style.opacity = currentSettings.bgOpacity;
        saveSettings();
      });

      // 卡片大小切换
      cardSizeToggle.addEventListener('click', (e) => {
        const btn = e.target.closest('.card-size-btn');
        if (!btn) return;
        const size = btn.dataset.size;
        if (size && size !== currentSettings.cardSize) {
          currentSettings.cardSize = size;
          applyAllSettings();
        }
      });

      // 重置按钮
      resetSettingsBtn.addEventListener('click', resetSettings);

      // ==================== 渲染导航 ====================
      function renderCategories() {
        categoriesWrapper.innerHTML = '';
        config.categories.forEach((cat, catIndex) => {
          const section = document.createElement('section');
          section.className = 'category-section';
          section.innerHTML = `
            <div class="category-header">
              <span class="category-icon material-symbols-outlined">${cat.icon || 'folder'}</span>
              <h2 class="category-title">${escapeHTML(cat.name)}</h2>
              <span class="category-count">${cat.links.length}</span>
            </div>
            <div class="links-grid">
              ${cat.links.map((link, i) => renderLink(link, catIndex, i)).join('')}
            </div>
          `;
          categoriesWrapper.appendChild(section);
        });
      }

      function renderLink(link, catIndex, linkIndex) {
        const extAttr = link.external ? 'target="_blank" rel="noopener noreferrer"' : '';
        const badge = link.external ? '<span class="external-badge material-symbols-outlined">open_in_new</span>' : '';
        const desc = link.description ? `<span class="link-card-desc">${escapeHTML(link.description)}</span>` : '';
        return `
          <a href="${escapeHTML(link.url)}" class="link-card"
             data-name="${escapeHTML(link.name.toLowerCase())}"
             data-desc="${escapeHTML((link.description || '').toLowerCase())}"
             ${extAttr}>
            <div class="link-card-icon-wrapper">
              <span class="material-symbols-outlined">${link.icon || 'link'}</span>
            </div>
            <div class="link-card-info">
              <span class="link-card-name">${escapeHTML(link.name)}${badge}</span>
              ${desc}
            </div>
          </a>
        `;
      }

      function escapeHTML(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      // 搜索过滤
      function filterCards(query) {
        const q = query.trim().toLowerCase();
        const cards = document.querySelectorAll('.link-card');
        let visibleCount = 0;
        cards.forEach(card => {
          const name = card.dataset.name || '';
          const desc = card.dataset.desc || '';
          const match = !q || name.includes(q) || desc.includes(q);
          card.style.display = match ? '' : 'none';
          if (match) visibleCount++;
        });
        document.querySelectorAll('.category-section').forEach(sec => {
          const visibleCards = sec.querySelectorAll('.link-card[style*="display: none"]');
          sec.style.display = visibleCards.length === sec.querySelectorAll('.link-card').length ? 'none' : '';
        });
        noResultsEl.classList.toggle('visible', q && visibleCount === 0);
        searchClearBtn.classList.toggle('visible', !!q);
      }

      searchInput.addEventListener('input', () => filterCards(searchInput.value));
      searchClearBtn.addEventListener('click', () => {
        searchInput.value = '';
        filterCards('');
        searchInput.focus();
      });

      // 键盘快捷键
      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey && e.key === 'k') || (e.key === '/' && document.activeElement !== searchInput)) {
          e.preventDefault();
          searchInput.focus();
        }
        if (e.key === 'Escape' && document.activeElement === searchInput) {
          searchInput.value = '';
          filterCards('');
          searchInput.blur();
        }
      });

      // ==================== 主题切换 ====================
      function getTheme() {
        const saved = localStorage.getItem('md3-nav-theme');
        if (saved === 'dark' || saved === 'light') return saved;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        const moon = themeToggle.querySelector('.icon-moon');
        const sun = themeToggle.querySelector('.icon-sun');
        if (theme === 'dark') {
          moon.style.display = 'none';
          sun.style.display = '';
        } else {
          moon.style.display = '';
          sun.style.display = 'none';
        }
        localStorage.setItem('md3-nav-theme', theme);
      }

      themeToggle.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme') || 'light';
        setTheme(current === 'dark' ? 'light' : 'dark');
      });

      // ==================== 初始化 ====================
      function init() {
        // 应用顶部栏文字
        document.getElementById('topBarTitle').querySelector('span:last-child').textContent = config.topBarTitle;
        document.getElementById('headerTitle').textContent = config.user.name;
        document.getElementById('headerSubtitle').textContent = config.user.bio;
        const avatarEl = document.getElementById('avatarEl');
        if (config.user.avatar.startsWith('http') || config.user.avatar.startsWith('./')) {
          avatarEl.innerHTML = `<img src="${config.user.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
        } else {
          avatarEl.textContent = config.user.avatar;
        }

        loadSettings();
        // 无背景图片时强制关闭开关
        if (!config.backgroundImage) {
          currentSettings.bgEnabled = false;
        }
        applyAllSettings();
        setTheme(getTheme());
        renderCategories();

        // 监听系统主题变化
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
          if (!localStorage.getItem('md3-nav-theme')) {
            setTheme(e.matches ? 'dark' : 'light');
          }
        });
      }

      init();
    })();
  </script>
</body>
</html>
